{% set name = "pysm3" %}
{% set version = "3.4.4" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 44c4aac3d5e0e56edbe9c5b9ab0650ccb325d36c7651db144563d2459f65d456

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - astropy-base
    - hatchling
    - hatch-vcs
    - healpy >=1.16.0
    - h5py
    - numba
    - numpy >=1.21
    - scipy >=1.10,<1.15
    - toml
  run:
    - python >={{ python_min }}
    - astropy-base
    - healpy >=1.16.0
    - h5py
    - numba
    - numpy >=1.21
    - scipy >=1.10,<1.15
    - toml

test:
  imports:
    - pysm3
  requires:
    - python {{ python_min }}
    - pytest
    - pytest-astropy

about:
  home: https://github.com/galsci/pysm
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Python Sky Model for Microwave and Submm experiments

  # The remaining entries in this section are optional, but recommended.
  doc_url: https://pysm3.readthedocs.io/

extra:
  recipe-maintainers:
    - zonca
